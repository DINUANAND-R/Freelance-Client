version: '3.9'

services:
  # ──────────────────────────────────────────────
  # MongoDB Database
  # ──────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: freelance_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: Freelancer
    volumes:
      - mongo_data:/data/db
    networks:
      - freelance_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ──────────────────────────────────────────────
  # Backend API Server
  # ──────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: freelance_server
    restart: unless-stopped
    environment:
      PORT: 9000
      MONGO_URL: mongodb+srv://dinuanand:Anand%40123@cluster0.zigguvh.mongodb.net/?appName=Cluster0
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
      CLIENT_URL: http://localhost:80
    ports:
      - "9000:9000"
    volumes:
      # Persist uploaded files on the host
      - server_uploads:/app/uploads
    networks:
      - freelance_net
    depends_on:
      mongo:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # Frontend (React + Nginx)
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Points the built React app at the server container on port 9000
        VITE_API_URL: http://localhost:9000
    container_name: freelance_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - freelance_net
    depends_on:
      - server

# ──────────────────────────────────────────────
# Named volumes
# ──────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  server_uploads:
    driver: local

# ──────────────────────────────────────────────
# Internal bridge network
# ──────────────────────────────────────────────
networks:
  freelance_net:
    driver: bridge
